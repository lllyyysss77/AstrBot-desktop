<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="keywords" content="AstrBot Soulter" />
    <meta name="description" content="AstrBot Dashboard" />
    <meta name="robots" content="noindex, nofollow" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit&family=Noto+Sans:wght@100..900&display=swap"
    />
    <!-- VAD (Voice Activity Detection) Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.wasm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/bundle.min.js"></script>
    <title>AstrBot - 仪表盘</title>
    <style>
      html, body, #app { width: 100%; height: 100%; margin: 0; }
      .desktop-startup {
        align-items: center;
        background: #f7f8fb;
        color: #4b5563;
        display: flex;
        font: 14px/1.5 system-ui, sans-serif;
        gap: 12px;
        height: 100%;
        justify-content: center;
      }
      .desktop-startup::before {
        animation: desktop-startup-spin 0.8s linear infinite;
        border: 2px solid #d7dbe3;
        border-radius: 50%;
        border-top-color: #6750a4;
        content: '';
        height: 18px;
        width: 18px;
      }
      @keyframes desktop-startup-spin { to { transform: rotate(360deg); } }
      @media (prefers-color-scheme: dark) {
        .desktop-startup { background: #1a1a1a; color: #d1d5db; }
      }
    </style>
  </head>
  <body>
    <div id="app"><div class="desktop-startup">正在启动 AstrBot 后端…</div></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
